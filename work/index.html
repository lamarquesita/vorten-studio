<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Work — Vorten Studio</title>
<link rel="icon" type="image/png" href="../favicon.png">
<meta name="description" content="A selection of projects we've shipped — Vorten Studio">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f0;--dark:#232323;--gray:#707070;--light-gray:#e8e8e3;
  --accent:#FF4D00;--green:#00AF38;--white:#fff;--card-radius:1.5rem;
  --global-px:1.5rem;--max-w:72rem;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Satoshi',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--dark);line-height:1.5;overflow-x:hidden;font-weight:700}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}

/* ─── HEADER ─── */
header{position:fixed;top:0.75rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;gap:0.625rem;align-items:center}
.logo{width:2rem;height:2rem;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:box-shadow .3s}
.logo:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.nav-pill{height:2rem;padding:0 0.75rem;background:var(--white);border-radius:9999px;display:flex;align-items:center;font-size:0.75rem;font-weight:700;color:var(--gray);letter-spacing:-0.02em;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:all .3s}
.nav-pill:hover{color:var(--dark);box-shadow:0 2px 8px rgba(0,0,0,.12)}

/* ─── WORK PAGE ─── */
.work-hero{padding:5.5rem var(--global-px) 2.5rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.625rem}
.work-hero h1{font-size:28px;font-weight:900;color:var(--dark)}
.work-hero p{font-size:13px;font-weight:700;color:var(--gray)}
.work-tabs{display:flex;gap:0;background:var(--white);border-radius:9999px;padding:0.25rem;margin-top:0.5rem}
.work-tab{flex:none;padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.875rem;font-weight:600;color:var(--gray);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .5s cubic-bezier(.7,0,0,1);position:relative;text-transform:capitalize}
.work-tab.active{color:var(--dark)}
.work-tab.active::before{content:'';position:absolute;inset:0;border-radius:9999px;background:#efefef;z-index:0}
.work-tab span{position:relative;z-index:1}
.work-grid{padding:2rem var(--global-px) 3rem;display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;max-width:50rem;margin:0 auto}
.work-grid-item{border-radius:var(--card-radius);overflow:hidden;cursor:pointer;background:#fff;padding:1rem;aspect-ratio:33/26.5;display:flex;align-items:center;justify-content:center}
.work-grid-item img{width:100%;height:100%;object-fit:cover;object-position:center;border-radius:0.75rem;transition:transform .3s}
.work-grid-item:hover img{transform:scale(1.03)}
.work-grid-item.card-logo{padding:1rem}
.work-grid-item.card-logo img{object-fit:contain;object-position:center;border-radius:0.75rem}
@media(max-width:768px){.work-grid{grid-template-columns:1fr}}

/* ─── LIGHTBOX ─── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.lightbox.open{opacity:1;pointer-events:auto}
.lightbox-card{height:100vh;aspect-ratio:33/26.5;background:#fff;border-radius:var(--card-radius);overflow:hidden;position:relative;padding:1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:zoom-in}
.lightbox-card img{width:100%;height:100%;object-fit:cover;object-position:center;border-radius:0.75rem}
.lightbox-card.zoomed{transform:scale(2);cursor:grab}
.lightbox-card.zoomed.dragging{cursor:grabbing}
.lightbox-card:not(.zoomed){transition:transform .3s}
.lightbox-card.zoomed:not(.dragging){transition:transform .3s}
.lightbox-top{position:absolute;top:1rem;right:1rem;display:flex;gap:0.5rem;z-index:2}
.lightbox-btn{width:2.25rem;height:2.25rem;background:rgba(0,0,0,.5);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lightbox-btn:hover{background:rgba(0,0,0,.7)}
.lightbox-btn svg{width:1rem;height:1rem;color:#fff}
.lightbox-arrow{position:absolute;top:50%;transform:translateY(-50%);width:2.75rem;height:2.75rem;background:rgba(255,255,255,.15);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:2}
.lightbox-arrow:hover{background:rgba(255,255,255,.3)}
.lightbox-arrow svg{width:1.25rem;height:1.25rem;color:#fff}
.lightbox-prev{left:1.5rem}
.lightbox-next{right:1.5rem}
.lightbox-counter{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);color:#fff;font-size:0.8125rem;font-weight:500;opacity:.7}

/* ─── FOOTER ─── */
footer{padding:3.5rem var(--global-px) 1.5rem}
.footer-inner{max-width:33.75rem;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:1.5rem}
footer p{font-size:0.875rem;font-weight:700;color:var(--gray);letter-spacing:-0.02em}
.footer-links{display:flex;gap:1rem}
.footer-links a{font-size:0.875rem;font-weight:700;color:var(--gray);letter-spacing:-0.02em;transition:color .2s}
.footer-links a:hover{color:var(--dark)}
@media(max-width:768px){.footer-inner{flex-direction:column-reverse;gap:1rem;text-align:center}}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a href="/" class="logo" aria-label="Home">
    <img src="../assets/logo.png" alt="Vorten Studio" style="width:2.5rem;height:2.5rem;object-fit:cover;border-radius:50%">
  </a>
  <a href="/work" class="nav-pill">Recent work</a>
</header>

<!-- WORK HERO -->
<div class="work-hero">
  <h1>From the studio</h1>
  <p>A look at what we've been making<br>across products, websites, and brand.</p>
  <div class="work-tabs">
    <button class="work-tab active" data-filter="product"><span>Product</span></button>
    <button class="work-tab" data-filter="web"><span>Web</span></button>
    <button class="work-tab" data-filter="brand"><span>Brand</span></button>
  </div>
</div>

<!-- WORK GRID -->
<div class="work-grid" id="work-grid">
  <div class="work-grid-item" data-cat="web"><img src="../assets/project-3.png" alt="Elite Property Management"></div>
  <div class="work-grid-item card-logo" data-cat="brand"><img src="../assets/project-5.png" alt="UntzDrop logo" style="background:#1D1713"></div>
  <div class="work-grid-item" data-cat="product"><img src="../assets/project-8.png" alt="WeOut app"></div>
  <div class="work-grid-item" data-cat="web"><img src="../assets/project-1.png" alt="Lighter project"></div>
  <div class="work-grid-item card-logo" data-cat="brand"><img src="../assets/project-7.png" alt="Elite PM logo"></div>
  <div class="work-grid-item" data-cat="web"><img src="../assets/project-4.png" alt="UntzDrop"></div>
  <div class="work-grid-item card-logo" data-cat="brand"><img src="../assets/project-6.png" alt="Vo logo" style="background:#f3f9f7"></div>
  <div class="work-grid-item" data-cat="product"><img src="../assets/project-2.png" alt="Dashboard project"></div>
  <div class="work-grid-item" data-cat="product"><img src="../assets/work-1.png" alt="Email inbox"></div>
  <div class="work-grid-item" data-cat="product"><img src="../assets/work-2.png" alt="Chat inbox"></div>
  <div class="work-grid-item" data-cat="product"><img src="../assets/work-3.png" alt="Calendar"></div>
  <div class="work-grid-item" data-cat="web"><img src="../assets/work-4.png" alt="Elite PM section"></div>
  <div class="work-grid-item" data-cat="web"><img src="../assets/work-5.png" alt="UntzDrop events"></div>
  <div class="work-grid-item" data-cat="web"><img src="../assets/work-6.png" alt="UntzDrop how it works"></div>
  <div class="work-grid-item" data-cat="web"><img src="../assets/work-7.png" alt="UntzDrop DJ section"></div>
  <div class="work-grid-item" data-cat="web"><img src="../assets/work-8.png" alt="WeOut landing"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-arrow lightbox-prev" id="lightbox-prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
  <div class="lightbox-card" id="lightbox-card">
    <div class="lightbox-top">
      <button class="lightbox-btn" id="lightbox-zoom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M8 11h6M11 8v6"/></svg></button>
      <button class="lightbox-btn" id="lightbox-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <img id="lightbox-img" src="" alt="">
  </div>
  <button class="lightbox-arrow lightbox-next" id="lightbox-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<footer>
  <div class="footer-inner">
    <p>&copy; 2026 Vorten Studio</p>
    <div class="footer-links">
      <a href="mailto:hello@vorten.studio">hello@vorten.studio</a>
      <a href="https://x.com/vortenstudio" target="_blank">Twitter/X</a>
      <a href="https://linkedin.com/company/vorten-studio" target="_blank">LinkedIn</a>
    </div>
  </div>
</footer>

<script>
// Lightbox
const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightbox-img');
const lightboxCard=document.getElementById('lightbox-card');
const lightboxCounter=document.getElementById('lightbox-counter');
let visibleItems=[];
let currentIdx=0;

function getVisibleItems(){
  return [...document.querySelectorAll('.work-grid-item')].filter(i=>i.style.display!=='none');
}
function showSlide(){
  visibleItems=getVisibleItems();
  const item=visibleItems[currentIdx];
  const img=item.querySelector('img');
  if(img){lightboxImg.src=img.src;lightboxCard.classList.remove('zoomed');lightboxCard.style.transform='';lightboxCounter.textContent=(currentIdx+1)+' of '+visibleItems.length}
}
function openLightbox(idx){
  currentIdx=idx;showSlide();lightbox.classList.add('open');
}
function navigate(dir){
  visibleItems=getVisibleItems();
  currentIdx=(currentIdx+dir+visibleItems.length)%visibleItems.length;
  showSlide();
}
document.getElementById('lightbox-prev').addEventListener('click',(e)=>{e.stopPropagation();navigate(-1)});
document.getElementById('lightbox-next').addEventListener('click',(e)=>{e.stopPropagation();navigate(1)});

let dragX=0,dragY=0,startX=0,startY=0,isDragging=false,didDrag=false;
function resetZoom(){lightboxCard.classList.remove('zoomed','dragging');dragX=0;dragY=0;lightboxCard.style.transform=''}
lightboxCard.addEventListener('mousedown',(e)=>{
  if(!lightboxCard.classList.contains('zoomed'))return;
  isDragging=true;didDrag=false;startX=e.clientX-dragX;startY=e.clientY-dragY;lightboxCard.classList.add('dragging');e.preventDefault();
});
window.addEventListener('mousemove',(e)=>{
  if(!isDragging)return;didDrag=true;
  dragX=e.clientX-startX;dragY=e.clientY-startY;
  lightboxCard.style.transform='scale(2) translate('+dragX/2+'px,'+dragY/2+'px)';
});
window.addEventListener('mouseup',()=>{isDragging=false;lightboxCard.classList.remove('dragging')});
lightboxCard.addEventListener('click',(e)=>{
  if(didDrag){didDrag=false;e.stopPropagation();return}
  if(lightboxCard.classList.contains('zoomed')){resetZoom();e.stopPropagation()}
  else{lightboxCard.classList.add('zoomed');dragX=0;dragY=0;e.stopPropagation()}
});
document.getElementById('lightbox-zoom').addEventListener('click',(e)=>{
  e.stopPropagation();
  if(lightboxCard.classList.contains('zoomed')){resetZoom()}
  else{lightboxCard.classList.add('zoomed');dragX=0;dragY=0}
});
document.getElementById('lightbox-close').addEventListener('click',()=>{resetZoom();lightbox.classList.remove('open')});
lightbox.addEventListener('click',(e)=>{if(e.target===lightbox){resetZoom();lightbox.classList.remove('open')}});
document.addEventListener('keydown',(e)=>{if(!lightbox.classList.contains('open'))return;if(e.key==='Escape')lightbox.classList.remove('open');if(e.key==='ArrowLeft')navigate(-1);if(e.key==='ArrowRight')navigate(1)});

// Click handler for grid items
document.addEventListener('click',(e)=>{
  const item=e.target.closest('.work-grid-item');
  if(!item)return;
  visibleItems=getVisibleItems();
  const idx=visibleItems.indexOf(item);
  if(idx>=0)openLightbox(idx);
});

function filterWork(filter){
  document.querySelectorAll('.work-grid-item').forEach(item=>{
    item.style.display=(item.dataset.cat===filter)?'':'none';
  });
}
filterWork('product');
document.querySelectorAll('.work-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.work-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    filterWork(tab.dataset.filter);
  });
});
</script>
</body>
</html>
